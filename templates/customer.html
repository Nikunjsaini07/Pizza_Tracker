<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - {{.OrderID}}</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 50px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #d32f2f; margin-top: 0; }
        .status-badge { display: inline-block; padding: 8px 16px; background-color: #ffe082; color: #b7791f; border-radius: 20px; font-weight: bold; margin: 15px 0; }

        .details { text-align: left; background: #fafafa; padding: 15px; border-radius: 6px; margin: 15px 0; border: 1px solid #eee; }
        .details p { margin: 5px 0; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🍕 Pizza Tracker</h2>
        
        <div class="status-badge" id="status-badge">
            Status: {{ .Status }}
        </div>

        <div class="details">
            <p><strong>Order ID:</strong> {{ .OrderID }}</p>
            <p><strong>Customer Name:</strong> {{ .CustomerName }}</p>
            <p><strong>Pizzas ordered:</strong></p>
            <ul>
                {{range .Items}}
                <li>{{.Size}} {{.Pizza}}</li>
                {{end}}
            </ul>   
        </div>
        
        <p>This page updates automatically in real-time!</p>
    </div>

    
    <script>
        const orderId = "{{.OrderID}}";

        
        const eventSource = new EventSource(`/notifications?orderId=${orderId}`);

        eventSource.onmessage = function(event) {
            console.log("Message received from Go:", event.data);
            if (event.data === "order_updated") {
                // Refresh the current page to display the new status
                window.location.reload();
            }
        };

        
        eventSource.onerror = function() {
            console.log("EventSource connection lost.");
        };
    </script>
</body>
</html>
