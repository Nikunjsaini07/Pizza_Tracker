<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Tracker - Day 1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 50px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 350px;
        }
        h2 { color: #d32f2f; margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #d32f2f; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #b71c1c; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🍕 Order a Pizza</h2>
                <!-- Success Banner -->
        {{if .Success}}
        <div style="background-color: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; font-size: 14px; text-align: center;">
            {{.Success}}
        </div>
        {{end}}

        <!-- Error Banner -->
        {{if .Error}}
        <div style="background-color: #ffebee; color: #c62828; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; font-size: 14px; text-align: center;">
            {{.Error}}
        </div>
        {{end}}
        <form action="/order" method="POST">
                        <!-- First Pizza Selection -->
            <div class="form-group">
                <label>Pizza 1:</label>
                <select name="pizza" required>
                    <option value="">-- Choose Pizza --</option>
                    {{range .PizzaTypes}}
                    <option value="{{.}}">{{.}}</option>
                    {{end}}
                </select>
                <select name="size" required style="margin-top: 5px;">
                    <option value="">-- Choose Size --</option>
                    {{range .PizzaSizes}}
                    <option value="{{.}}">{{.}}</option>
                    {{end}}
                </select>
            </div>

            <!-- Second Pizza Selection -->
            <div class="form-group" style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px;">
                <label>Pizza 2:</label>
                <select name="pizza" required>
                    <option value="">-- Choose Pizza --</option>
                    {{range .PizzaTypes}}
                    <option value="{{.}}">{{.}}</option>
                    {{end}}
                </select>
                <select name="size" required style="margin-top: 5px;">
                    <option value="">-- Choose Size --</option>
                    {{range .PizzaSizes}}
                    <option value="{{.}}">{{.}}</option>
                    {{end}}
                </select>
            </div>

            <button type="submit">Submit Order</button>
        </form>
    </div>
</body>
</html>
