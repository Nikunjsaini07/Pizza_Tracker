<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slice & Track - Order Pizza</title>
    <!-- Google Fonts: Inter for clean geometric sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #faf8f5;
            --card-bg: rgba(255, 255, 255, 0.55);
            --card-border: rgba(0, 0, 0, 0.15);
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent-green-bg: rgba(34, 197, 94, 0.45);
            --accent-green-hover: rgba(22, 163, 74, 0.85);
            --accent-green-border: rgba(0, 0, 0, 0.2);
            --accent-green-text: #166534;
            --input-border: #4b5563;
            --input-focus: #111827;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            /* User provided image faded with low opacity overlay */
            background-image: linear-gradient(rgba(250, 248, 245, 0.5), rgba(250, 248, 245, 0.5)), url('/static/bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 460px;
        }

        /* Glassmorphic White Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 
                        0 8px 10px -6px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        /* CVGeniee Bold Geometric Heading Style */
        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Transparent Input with distinct dark border */
        input[type="text"], select {
            width: 100%;
            padding: 12px 14px;
            background: transparent;
            border: 1.5px solid var(--input-border);
            border-radius: 4px; /* Slightly rounded as observed */
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #9ca3af;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 1px var(--input-focus);
        }

        /* Custom select arrow */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%234b5563' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 40px;
        }

        .pizza-item-row {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 16px;
            position: relative;
            animation: rowSlideIn 0.2s ease forwards;
        }

        @keyframes rowSlideIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .pizza-row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .pizza-row-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .btn-remove {
            background: none;
            border: none;
            color: #dc2626;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .btn-remove:hover {
            background: rgba(220, 38, 38, 0.08);
        }

        .pizza-inputs {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 10px;
        }

        /* Secondary Button (Add Row) */
        .btn-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 11px;
            background: rgba(0, 0, 0, 0.03);
            border: 1.5px dashed rgba(0, 0, 0, 0.25);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.06);
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        /* CVGeniee Primary Sage Green Button */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-green-bg);
            border: 1px solid var(--accent-green-border);
            border-radius: 4px;
            color: var(--accent-green-text);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-primary:hover {
            background-color: var(--accent-green-hover);
            color: white;
            transform: scale(1.02); /* Hover scale-up as observed */
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .alert {
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 24px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
        }

        .alert-error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🍕 Slice & Track</h1>
                <p>Order fresh wood-fired pizzas in real-time</p>
            </div>

            <!-- Error Banner -->
            {{if .Error}}
            <div class="alert alert-error">
                ⚠️ {{.Error}}
            </div>
            {{end}}

            <form action="/order" method="POST" id="order-form">
                <!-- Customer Name Field -->
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>

                <!-- Pizza items container -->
                <div class="form-group">
                    <label>Your Pizza Selection</label>
                    <div id="pizza-items-container">
                        <!-- Rows injected dynamically via JS -->
                    </div>
                </div>

                <button type="button" class="btn-secondary" id="btn-add-pizza">
                    <span>+ Add Another Pizza</span>
                </button>

                <button type="submit" class="btn-primary">Place Order</button>
            </form>
        </div>
    </div>

    <script>
        // Server side values converted to JS arrays
        const pizzaTypes = [
            {{range .PizzaTypes}}
            "{{.}}",
            {{end}}
        ];
        const pizzaSizes = [
            {{range .PizzaSizes}}
            "{{.}}",
            {{end}}
        ];

        const container = document.getElementById('pizza-items-container');
        const addBtn = document.getElementById('btn-add-pizza');
        let rowCount = 0;

        function createPizzaRow() {
            rowCount++;
            const row = document.createElement('div');
            row.className = 'pizza-item-row';
            row.id = `pizza-row-${rowCount}`;

            let removeButtonHtml = '';
            if (rowCount > 1) {
                removeButtonHtml = `<button type="button" class="btn-remove" onclick="removePizzaRow(${rowCount})">Remove</button>`;
            }

            let typeOptions = `<option value="">-- Choose Pizza --</option>`;
            pizzaTypes.forEach(t => {
                typeOptions += `<option value="${t}">${t}</option>`;
            });

            let sizeOptions = `<option value="">-- Size --</option>`;
            pizzaSizes.forEach(s => {
                sizeOptions += `<option value="${s}">${s}</option>`;
            });

            row.innerHTML = `
                <div class="pizza-row-header">
                    <span class="pizza-row-title">Pizza #${rowCount}</span>
                    ${removeButtonHtml}
                </div>
                <div class="pizza-inputs">
                    <select name="pizza" required>
                        ${typeOptions}
                    </select>
                    <select name="size" required>
                        ${sizeOptions}
                    </select>
                </div>
            `;
            container.appendChild(row);
        }

        function removePizzaRow(id) {
            const row = document.getElementById(`pizza-row-${id}`);
            if (row) {
                row.remove();
                reindexRows();
            }
        }

        function reindexRows() {
            const rows = container.getElementsByClassName('pizza-item-row');
            rowCount = 0;
            Array.from(rows).forEach((row, index) => {
                rowCount++;
                row.id = `pizza-row-${rowCount}`;
                const title = row.querySelector('.pizza-row-title');
                title.textContent = `Pizza #${rowCount}`;
                
                const removeBtn = row.querySelector('.btn-remove');
                if (rowCount === 1) {
                    if (removeBtn) removeBtn.remove();
                } else {
                    if (!removeBtn) {
                        const header = row.querySelector('.pizza-row-header');
                        const newBtn = document.createElement('button');
                        newBtn.type = 'button';
                        newBtn.className = 'btn-remove';
                        newBtn.setAttribute('onclick', `removePizzaRow(${rowCount})`);
                        newBtn.textContent = 'Remove';
                        header.appendChild(newBtn);
                    } else {
                        removeBtn.setAttribute('onclick', `removePizzaRow(${rowCount})`);
                    }
                }
            });
        }

        // Add the first row automatically
        createPizzaRow();

        addBtn.addEventListener('click', createPizzaRow);
    </script>
</body>
</html>
